<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genesis | 1.21.4 Menu</title>
    <link rel="stylesheet" href="style.css">
    <!-- Using Google Fonts for a modern UI -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="cheat-menu" class="glass-panel">
        <header class="menu-header">
            <h2>Genesis <span class="version">v1.21.4</span></h2>
            <div class="drag-handle"></div>
        </header>

        <nav class="sidebar">
            <button class="nav-btn active" data-tab="combat">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.5 17.5L3 6V3h3l11.5 11.5"></path><path d="M13 19l6-6"></path><path d="M16 16l4 4"></path><path d="M19 21l2-2"></path><path d="M21 19l-4-4"></path></svg>
                Combat
            </button>
            <button class="nav-btn" data-tab="visuals">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                Visuals
            </button>
            <button class="nav-btn" data-tab="movement">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path></svg>
                Movement
            </button>
            <button class="nav-btn" data-tab="settings">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                Settings
            </button>
        </nav>

        <main class="content">
            <!-- Combat Tab -->
            <div id="tab-combat" class="tab-pane active">
                <div class="module-card">
                    <div class="module-header">
                        <div>
                            <h3>Aimbot</h3>
                            <p class="description">Smoothly locks your crosshair onto targets.</p>
                        </div>
                        <label class="switch">
                            <input type="checkbox" id="toggle-aimbot">
                            <span class="slider round"></span>
                        </label>
                    </div>
                    <div class="module-settings" id="aimbot-settings">
                        <div class="setting-slider">
                            <label for="aimbot-speed">Smoothness / Speed</label>
                            <input type="range" id="aimbot-speed" min="1" max="100" value="30">
                            <span class="value-display" id="aimbot-speed-val">30</span>
                        </div>
                        <div class="setting-slider">
                            <label for="aimbot-fov">Field of View (FOV)</label>
                            <input type="range" id="aimbot-fov" min="10" max="360" value="180">
                            <span class="value-display" id="aimbot-fov-val">180&deg;</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Other Tabs (Placeholder) -->
            <div id="tab-visuals" class="tab-pane">
                <div class="placeholder-text">Choose Visual Modules...</div>
            </div>
            <div id="tab-movement" class="tab-pane">
                <div class="placeholder-text">Choose Movement Modules...</div>
            </div>
            <div id="tab-settings" class="tab-pane">
                <div class="placeholder-text">Cheat Settings...</div>
            </div>
        </main>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
